# Gerado manualmente como ponto de partida - `fly launch` pode sobrescrever/ajustar
# (ex.: app name e region) na primeira execucao. Ver README.md, secao "Rodando como
# servico publico (HTTP)".
app = "doc-agent"
primary_region = "gru"

[build]

[env]
  DOC_AGENT_TRANSPORT = "streamable-http"
  HOST = "0.0.0.0"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
